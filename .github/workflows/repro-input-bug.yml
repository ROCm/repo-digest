name: Repro INPUT_ env var bug in container jobs

on:
  workflow_dispatch:

jobs:
  container-job:
    runs-on: build-only-repo-digest
    container:
      image: ubuntu:24.04
      volumes:
        - /tmp/artifacts:/artifacts
    steps:
      - name: Create test file
        shell: bash
        run: echo "hello" > /artifacts/test-artifact.txt

  upload-job:
    runs-on: build-only-repo-digest
    needs: container-job
    steps:
      - name: Upload artifact (v7)
        uses: actions/upload-artifact@v7
        with:
          name: test-artifact
          path: /tmp/artifacts/test-artifact.txt

  no-container-job:
    runs-on: build-only-repo-digest
    steps:
      - name: Create test file
        shell: bash
        run: echo "hello" > /tmp/test-artifact.txt

      - name: Upload artifact (v7)
        uses: actions/upload-artifact@v7
        with:
          name: test-artifact-no-container
          path: /tmp/test-artifact.txt
