name: Daily LLVM Digest (AMD/AMDGPU/ROCm)

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  digest:
    runs-on: build-only-repo-digest
    container: ubuntu:24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-prerequisites

      - name: Checkout LLVM Repository
        uses: actions/checkout@v6
        with:
          repository: llvm/llvm-project
          path: llvm-project
          ref: main
          fetch-depth: 0

      # WORKAROUND: Pre-install and warmup Claude Code
      - uses: ./.github/actions/warmup-claude-code
        with:
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          llm_gateway_key: ${{ secrets.LLM_GATEWAY_KEY }}

      - name: Generate Digest
        id: claude-code
        timeout-minutes: 30
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "Ocp-Apim-Subscription-Key: ${{ secrets.LLM_GATEWAY_KEY }}"
          ANTHROPIC_MODEL: "Claude-Sonnet-4.5"
          ANTHROPIC_DEFAULT_OPUS_MODEL: "Claude-Opus-4.5"
          ANTHROPIC_DEFAULT_SONNET_MODEL: "Claude-Sonnet-4.5"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: "Claude-Haiku-4.5"
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: "sk-ant-dummy-gateway-key"
          show_full_output: true
          prompt: |
            .claude/projects/llvm.md
            1
          claude_args: "--agent digest --allowedTools Bash,Write,Edit,Read,Glob,Grep,TodoWrite,Task"
          settings: |
            {
              "hasCompletedOnboarding": true
            }

      - name: Upload Digest
        uses: actions/upload-artifact@v4
        with:
          name: llvm-digest
          path: "digests/digest-*.md"

      - name: Upload Claude Execution Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log
          path: ${{ steps.claude-code.outputs.execution_file }}
