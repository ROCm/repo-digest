name: Install and Warmup Claude Code
description: >
  Pre-installs Claude Code and runs first-run initialization.

  WORKAROUND: Without this step, claude-code-action hangs indefinitely after
  printing "Running Claude with prompt from file: ..." with no LLM requests
  being made. This step pre-installs Claude Code and runs a simple command to
  complete first-run initialization before the action runs.

  TODO: This workaround may be addressing temporary issues in claude-code-action,
  Claude Code CLI, or server-side. The same hang was observed even with standard
  console_auth setup (without LLM gateway). Re-test periodically to check if
  this workaround is still needed.

inputs:
  anthropic_base_url:
    description: Base URL for the Anthropic API / LLM gateway
    required: true
  llm_gateway_key:
    description: Subscription key for the LLM gateway
    required: true

runs:
  using: composite
  steps:
    - name: Install and Warmup Claude Code
      shell: bash
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        ANTHROPIC_CUSTOM_HEADERS: "Ocp-Apim-Subscription-Key: ${{ inputs.llm_gateway_key }}"
        ANTHROPIC_API_KEY: "sk-ant-dummy-gateway-key"
        ANTHROPIC_MODEL: "Claude-Sonnet-4.5"
      run: |
        # Install Claude Code
        curl -fsSL https://claude.ai/install.sh | bash -s -- 2.1.31

        export PATH="$HOME/.local/bin:$PATH"

        # Verify installation
        claude --version

        # Warmup: Run a simple command to initialize Claude Code state
        # This creates necessary config files and does first-run setup
        timeout 60 claude --print -p "Say OK" || {
          exit_code=$?
          if [ $exit_code -eq 124 ]; then
            echo "Warmup timed out (acceptable)"
          else
            echo "::warning::Warmup failed with exit code $exit_code"
          fi
        }
